databaseChangeLog:
  - changeSet:
      id: 001
      author: lochana.v
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: first_name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: last_name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: country
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: reference
                  type: VARCHAR(255)

              - column:
                  name: email
                  type: VARCHAR(255)